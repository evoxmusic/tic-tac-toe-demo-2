services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tictactoe
      POSTGRES_USER: tictactoe
      POSTGRES_PASSWORD: tictactoe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tictactoe -d tictactoe"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tictactoe:tictactoe@db:5432/tictactoe
      PORT: 3000

volumes:
  pgdata:
